{% set name = "trame-tauri" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/trame_tauri-{{ version }}.tar.gz
  sha256: 408d9222119917c2e12bec1b48f79326a99d05a6f9d989c93c8f9a0309f3eb48

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - trame-client

test:
  imports:
    - trame
    - trame_tauri
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Kitware/trame-tauri
  summary: Helper widget to provide simpler integration with Tauri
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jourdain
    - psavery
